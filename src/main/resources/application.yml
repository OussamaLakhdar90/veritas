spring:
  application:
    name: veritas
  datasource:
    # WAL lets readers proceed during a write and busy_timeout makes a second writer WAIT (5s) instead of
    # instantly failing with SQLITE_BUSY — required now that concurrent scans/fix-trains write simultaneously.
    url: jdbc:sqlite:veritas.db?journal_mode=WAL&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

server:
  address: 127.0.0.1
  port: 8080

# Operational observability. The built-in meters (http.server.requests, jvm.*, hikaricp.*) plus the veritas.*
# domain gauges (MetricsConfig) are exposed at /actuator/metrics; health/info round it out. Only these three
# endpoints are exposed (never env/beans/configprops). On the EC2 'server' profile, lock /actuator down too.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized
      group:
        # Downstream-integration health (Jira/Bitbucket/Confluence/Xray/Copilot) in its own group so it can be
        # scraped at /actuator/health/integrations without live network probes sitting on the default liveness path.
        # Opt-in via veritas.health.integrations.enabled=true (the indicator bean is otherwise not registered).
        integrations:
          include: downstreamIntegrations

veritas:
  demo:
    # Seed a realistic 30-day demo portfolio at startup (8 services, scans/findings/defects/Snyk/test assets).
    # HONEST demo mode: the UI shows a visible "demo data" badge while this is on. Idempotent (skips when data
    # exists). Keep snyk.poll-enabled=false alongside, or the real poller overwrites the seeded posture.
    seed: false
  secret:
    auto-passphrase: true   # local-first: auto-generate a machine-bound key (~/.veritas/secret.key) so in-app token
                            # entry works without editing YAML. The `server` (EC2) profile sets this false — a
                            # home-dir key is unsafe on a shared host; use Vault/KMS + per-user keys there.
  llm:
    mode: mock          # mock | copilot (CLI) | http (Copilot HTTP API, device flow)
    model: claude-sonnet-4.6
    timeout-seconds: 180
    context-budget-chars: 16000   # per untrusted input block; oversized inputs trimmed head+tail to cut noise
    max-prompt-tokens: 60000      # whole-prompt cap (est. ~4 chars/token). Over this, untrusted inputs are squeezed
                                  # to fit the model's context window; 0 disables the cap. Tune to the model context size.
    output-headroom-tokens: 8000  # tokens reserved for the model's reply inside the context window
    batch-input-tokens: 24000     # per-batch budget for large list inputs (release issues, reconcile findings); 0 = never batch
    cache-max-entries: 500        # bounded LRU for the prompt cache (server mode); 0 = unbounded
    http-read-timeout-ms: 180000  # read timeout for the Copilot HTTP call — LLM generation can exceed the REST timeout
  report:
    bilingual: true     # render EN/FR; translation is the ONLY LLM call in report generation and uses the cheapest tier
  http:                  # BNC-facing HTTP transport (Jira v2 + Copilot)
    powershell-fallback: false      # set true if the JVM is blocked by the corporate firewall but powershell.exe is allowed
    powershell-timeout-seconds: 60
  copilot:               # used when llm.mode=http — the device-flow HTTP gateway (see docs/reference-contract-validator.md)
    client-id: "Iv1.b507a08c87ecfe98"
    github-base: "https://github.com"
    api-base: "https://api.github.com"
    copilot-base: "https://api.githubcopilot.com"
    token-file: "${user.home}/.veritas/copilot-auth.json"   # owner-only perms set on write
    editor-version: "vscode/1.100.0"
    integration-id: "vscode-chat"
    api-version: "2025-04-01"
  # Recommended BNC defaults (Server/DC, HTTP access token). All editable in the Settings UI; a saved
  # connections.json overrides these at next start. Auth: BEARER (HTTP access token) | BASIC (username + password).
  connections:
    bitbucket:
      base-url: "https://git.bnc.ca"
      edition: SERVER_DC                       # SERVER_DC (BNC) | CLOUD — switches live via GitHostRouter
      workspace: ""                            # Cloud only; on Server/DC the project key is the app-id (entered on Validate)
      auth-type: BEARER                        # BEARER (HTTP access token) | BASIC (username + password)
    jira:
      base-url: "https://jira.bnc.ca"
      edition: SERVER_DC        # SERVER_DC (v2 + wiki-markup + Bearer PAT, matches BNC) | CLOUD (v3 + ADF)
      auth-type: BEARER         # BEARER (HTTP access token) | BASIC (username + password)
    confluence:
      base-url: "https://wiki.bnc.ca"
      edition: SERVER_DC
      auth-type: BEARER
    xray:
      base-url: "https://jira.bnc.ca"          # Server/DC: Raven REST on the Jira host
      edition: SERVER_DC        # SERVER_DC (Raven REST on Jira host, matches BNC) | CLOUD (GraphQL)
      auth-type: BEARER         # SERVER_DC: BEARER (Xray/Jira token) | CLOUD: CLIENT_CREDENTIALS
    snyk:
      base-url: "https://api.snyk.io"          # Snyk SaaS REST/v1 API; auth = personal API token / PAT ("token <key>")
      auth-type: BEARER
  # Snyk dependency-security module (Automation). Poller is OFF by default (no background network calls in tests);
  # enable it in the Settings/Snyk UI or via veritas.snyk.poll-enabled=true.
  snyk:
    api-version: "2024-10-15"     # Snyk REST API version date (?version=); v1 aggregated-issues needs no version
    poll-enabled: false
    poll-interval-ms: 86400000    # once a day between watched-repo vulnerability polls
    poll-initial-delay-ms: 60000  # first poll ~1 min after application start
    framework:
      project: "APP7488"          # Bitbucket project holding the lsist-test-framework bom/core/api/web repos
      branch: "develop"           # integration branch the cascade branches off + opens PRs against (main/master on some setups)
      consumer-repo: "application-tests"   # repo under each watched app-id holding the consumer poms Veritas bumps
      # default-reviewers: []      # Bitbucket usernames added when git history yields no reviewer suggestion
    retention:                    # prune the Snyk growth tables (latest snapshot per watch is always kept). 0 disables.
      snapshot-days: 30
      alert-days: 60
      fix-train-days: 90
    fix:
      reactor-timeout-seconds: 900   # per-command timeout for the local reactor build (cold repo + multi-module + N app tests)

logging:
  level:
    ca.bnc.qe.veritas: INFO

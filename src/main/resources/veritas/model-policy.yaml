# Maps a step's tier -> concrete model (+ fallbacks). Edit here when Copilot's model line-up changes.
# IDs must match what the Copilot /models endpoint returns (they are sent verbatim as the chat model id).
tiers:
  economy:  { primary: gpt-5-mini,        fallbacks: [gemini-3-flash, claude-haiku-4.5] }
  standard: { primary: claude-sonnet-4.6, fallbacks: [gpt-5.4] }
  deep:     { primary: gpt-5.4,           fallbacks: [gemini-3.1-pro, claude-sonnet-4.6] }
  frontier: { primary: claude-opus-4.8,   fallbacks: [gpt-5.5] }

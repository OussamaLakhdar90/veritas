# SonarQube configuration for Veritas. Run with: mvn -ntp verify && sonar-scanner
# (the Java 'build' job produces target/site/jacoco/jacoco.xml, which Sonar reads for coverage).
sonar.projectKey=ca.bnc.qe.veritas
sonar.projectName=Veritas
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage — JaCoCo XML produced by the jacoco-maven-plugin (jacoco-report execution, test phase).
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Coverage exclusions — code with no testable logic, kept out of the coverage DENOMINATOR (standard practice):
#  - the Spring Boot main + the picocli top-level command (framework wiring)
#  - @Configuration beans and @ConfigurationProperties POJOs (config, no branches worth testing)
#  - the bootstrap EnvironmentPostProcessor (runs before the Spring context; not unit-testable)
# NOTE: integration clients, services, the engine and renderers are NOT excluded — they are tested.
sonar.coverage.exclusions=\
  **/VeritasApplication.java,\
  **/cli/VeritasTopCommand.java,\
  **/config/**,\
  **/*Properties.java,\
  **/secret/SettingsEnvironmentPostProcessor.java

# The dashboard (TS) is covered by its own Vitest suite under the -Pdashboard profile / dashboard-tests CI job.
sonar.exclusions=src/main/resources/static/**,dashboard/**

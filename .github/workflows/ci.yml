name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # Dashboard tests run in their OWN job with node — independent of the Java 'build' job, which stays node-free.
  # A node/npm flake here never blocks the backend build.
  dashboard-tests:
    name: Dashboard tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        run: npm ci
        working-directory: dashboard
      - name: Test (with coverage gate)
        run: npm run test:cov
        working-directory: dashboard

  # PIT mutation testing — slow and occasionally flaky, so it runs in its OWN non-blocking job (continue-on-error)
  # that never gates a merge. It surfaces test-strength regressions on the core engine without slowing the build.
  mutation:
    name: Mutation testing (PIT)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: PIT (engine core)
        run: >
          mvn -B -ntp -Pmutation
          -Dmutation.classes=ca.bnc.qe.veritas.engine.*
          -Dmutation.tests=ca.bnc.qe.veritas.engine.*
          test-compile org.pitest:pitest-maven:mutationCoverage
      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: target/pit-reports/
          if-no-files-found: ignore

  # Frontend mutation testing (Stryker) — symmetric with the backend PIT job: its own non-blocking, push-only job
  # that surfaces dashboard test-strength gaps without ever gating a merge.
  frontend-mutation:
    name: Frontend mutation (Stryker)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        run: npm ci
        working-directory: dashboard
      - name: Stryker
        run: npm run test:mutation
        working-directory: dashboard
      - name: Upload Stryker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: dashboard/reports/
          if-no-files-found: ignore

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t veritas:${{ github.sha }} .
